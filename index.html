<!-- ==========================================
     AI CHATBOT SECTION (မူရင်း code များအောက်တွင် ထည့်ပါ)
     ========================================== -->
<div id="ai-chat-wrapper" style="position: fixed; bottom: 30px; right: 30px; z-index: 9999; font-family: 'Inter', sans-serif;">
    <!-- Chat Toggle Button -->
    <button id="chat-toggle" onclick="toggleChat()" style="background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; border: none; width: 60px; height: 60px; border-radius: 50%; cursor: pointer; box-shadow: 0 10px 25px rgba(37, 99, 235, 0.4); display: flex; align-items: center; justify-content: center; transition: 0.3s;">
        <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m3 21 1.9-5.7a8.5 8.5 0 1 1 3.8 3.8z"/></svg>
    </button>

    <!-- Chat Window -->
    <div id="chat-window" style="display: none; width: 350px; height: 500px; background: white; border-radius: 20px; box-shadow: 0 15px 50px rgba(0,0,0,0.15 ); flex-direction: column; position: absolute; bottom: 80px; right: 0; overflow: hidden; border: 1px solid #f1f5f9; animation: slideUp 0.3s ease;">
        <!-- Header -->
        <div style="background: linear-gradient(135deg, #2563eb, #7c3aed); color: white; padding: 20px; display: flex; align-items: center; gap: 12px;">
            <div style="width: 10px; height: 10px; background: #4ade80; border-radius: 50%;"></div>
            <div>
                <div style="font-weight: 800; font-size: 16px;">Kyaw Htet AI</div>
                <div style="font-size: 12px; opacity: 0.8;">Online • Ready to help</div>
            </div>
        </div>

        <!-- Chat Messages Area -->
        <div id="chat-messages" style="flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 15px; background: #f8fafc;">
            <div style="background: white; padding: 12px 16px; border-radius: 15px 15px 15px 2px; align-self: flex-start; max-width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; color: #334155; line-height: 1.5;">
                Mingalaba! 🙏 I'm Kyaw Htet's AI assistant. How can I help you with design projects today?
            </div>
        </div>

        <!-- Input Area -->
        <div style="padding: 15px; background: white; border-top: 1px solid #f1f5f9; display: flex; gap: 10px;">
            <input id="chat-input" type="text" placeholder="Ask me anything..." onkeypress="if(event.key === 'Enter') sendMessage()" style="flex: 1; border: 1px solid #e2e8f0; padding: 12px; border-radius: 12px; outline: none; font-size: 14px; transition: 0.2s;">
            <button onclick="sendMessage()" style="background: #2563eb; color: white; border: none; width: 45px; height: 45px; border-radius: 12px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s;">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
            </button>
        </div>
    </div>
</div>

<style>
    @keyframes slideUp { from { opacity: 0; transform: translateY(20px ); } to { opacity: 1; transform: translateY(0); } }
    #chat-input:focus { border-color: #2563eb; box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
</style>

<script>
    function toggleChat() {
        const win = document.getElementById('chat-window');
        win.style.display = (win.style.display === 'none' || win.style.display === '') ? 'flex' : 'none';
    }

    function sendMessage() {
        const input = document.getElementById('chat-input');
        const container = document.getElementById('chat-messages');
        const text = input.value.trim();
        
        if (text !== "") {
            // User Message
            const userDiv = document.createElement('div');
            userDiv.innerHTML = text;
            userDiv.style = "background: #2563eb; color: white; padding: 12px 16px; border-radius: 15px 15px 2px 15px; align-self: flex-end; max-width: 85%; font-size: 14px; box-shadow: 0 4px 10px rgba(37, 99, 235, 0.2);";
            container.appendChild(userDiv);
            
            input.value = "";
            container.scrollTop = container.scrollHeight;

            // AI Response Logic
            setTimeout(() => {
                const aiDiv = document.createElement('div');
                aiDiv.style = "background: white; padding: 12px 16px; border-radius: 15px 15px 15px 2px; align-self: flex-start; max-width: 85%; box-shadow: 0 2px 5px rgba(0,0,0,0.05); font-size: 14px; color: #334155;";
                
                const lowerText = text.toLowerCase();
                if (lowerText.includes("price") || lowerText.includes("cost")) {
                    aiDiv.innerText = "Project costs depend on the scope. Generally, logos start from $XX. Would you like to schedule a call?";
                } else if (lowerText.includes("hello") || lowerText.includes("hi")) {
                    aiDiv.innerText = "Hello! I can help you with branding, logo design, or UI/UX inquiries. What's on your mind?";
                } else if (lowerText.includes("service") || lowerText.includes("work")) {
                    aiDiv.innerText = "Kyaw Htet offers Branding, Logo Design, and Video Editing services. You can see them in the Portfolio section!";
                } else {
                    aiDiv.innerText = "Got it! I'll notify Kyaw Htet about your message. Feel free to leave your contact info!";
                }
                
                container.appendChild(aiDiv);
                container.scrollTop = container.scrollHeight;
            }, 1000);
        }
    }
</script>
<!-- ========================================== -->
